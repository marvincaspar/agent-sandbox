# tinyproxy requires User/Group even inside a container
User tinyproxy
Group tinyproxy

Port 8888
Listen 0.0.0.0
Timeout 600
LogLevel Warning
MaxClients 100

# Filter by hostname only (not full URL), required for CONNECT/HTTPS matching
Filter "/etc/tinyproxy/filter"
FilterURLs Off
FilterCaseSensitive Off

# Default-deny: block everything not in the filter file
FilterDefaultDeny Yes

# Only allow CONNECT to standard HTTPS ports
ConnectPort 443
ConnectPort 563
